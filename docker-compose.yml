version: "3.9"

services:

  doctor-service:
    build: ./services/doctor-service
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      MONGO_URI: mongodb://doctor-db:27017
      MONGO_DB_NAME: doctor-service
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      doctor-db:
        condition: service_healthy
    networks:
      - app-network

  doctor-db:
    image: mongo:6
    ports:
      - "27018:27017"   # host port 27018 → container 27017
    volumes:
      - doctor-data:/data/db
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  medical-report-service:
    build: ./services/medical-report-service
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      MONGO_URI: mongodb://medical-db:27017
      MONGO_DB_NAME: medical-report-service
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      medical-db:
        condition: service_healthy
    networks:
      - app-network

  medical-db:
    image: mongo:6
    ports:
      - "27019:27017"   # host port 27019 → container 27017
    volumes:
      - medical-data:/data/db
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  doctor-data:
  medical-data: